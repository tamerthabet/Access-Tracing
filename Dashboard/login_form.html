<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Access Tracing | Login Portal | Philadelphia University – Tamer Thabet</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #0d1117, #1c2a3a);
    color: #e6edf3;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-container {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0, 179, 255, 0.2);
    width: 350px;
    padding: 30px 25px;
    text-align: center;
  }

  .login-container h1 {
    color: #00b3ff;
    font-size: 22px;
    margin-bottom: 25px;
    letter-spacing: 0.5px;
  }

  label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin: 10px 0 5px;
    color: #9aa7b2;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px;
    background-color: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: #00b3ff;
    box-shadow: 0 0 5px #00b3ff55;
  }

  button {
    width: 100%;
    background: #00b3ff;
    border: none;
    border-radius: 6px;
    color: #fff;
    padding: 10px;
    margin-top: 15px;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    letter-spacing: 0.3px;
    transition: background 0.25s ease;
  }

  button:hover {
    background: #0095d9;
  }

  .footer {
    font-size: 12px;
    margin-top: 15px;
    color: #888;
  }

  .footer span {
    color: #00b3ff;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="login-container">
    <h1>Admin Dashboard Login</h1>
    <form action="login.php" method="post">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Login</button>
    </form>
    <div class="footer">
      <p>2025 <span>Philadelphia University</span><br>Developed by Tamer Thabet</p>
    </div>
  </div>
</body>
</html>
